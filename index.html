<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Choco 期中考闖關遊戲</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
:root{
  --bl:#a8d8f0;--bl2:#7ec8e8;--dk:#3a7bbf;
  --pk:#f9c4d2;--pk2:#f4a3be;--pk3:#d4608a;
  --pu:#c9b8e8;--pu2:#9b7ed4;
  --gn:#b5e8c8;--ye:#fff3b0;
  --cr:#fff8f5;--tx:#4a3f5c;
  --sh:0 8px 32px rgba(100,150,220,.18);
  --sh2:0 3px 12px rgba(100,150,220,.12);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{font-family:'Noto Sans TC','Nunito',sans-serif;background:linear-gradient(135deg,#ddf0fc 0%,#f9c4d2 45%,#c9b8e8 100%);min-height:100vh;color:var(--tx);overflow-x:hidden}

/* bg stars */
.star{position:fixed;pointer-events:none;animation:twinkle 2.2s ease-in-out infinite alternate;z-index:0;font-size:15px;user-select:none}
@keyframes twinkle{0%{opacity:.2;transform:scale(.8)}100%{opacity:.9;transform:scale(1.2)}}
.cloud{position:fixed;background:white;border-radius:60px;opacity:.35;animation:floatC linear infinite;z-index:0;pointer-events:none}
@keyframes floatC{0%{transform:translateX(-250px)}100%{transform:translateX(110vw)}}

.wrap{position:relative;z-index:1;max-width:820px;margin:0 auto;padding:16px 12px 60px}

/* ── HEADER ── */
.hdr{text-align:center;margin-bottom:20px;animation:dropIn .7s cubic-bezier(.23,1.32,.57,.97) both}
@keyframes dropIn{from{opacity:0;transform:translateY(-36px) scale(.9)}to{opacity:1;transform:none}}
.hdr-card{background:white;border-radius:32px;padding:20px 24px 16px;box-shadow:var(--sh);display:inline-flex;align-items:center;gap:16px;min-width:300px;max-width:100%;position:relative;overflow:hidden}
.hdr-card::before{content:'';position:absolute;top:0;left:0;right:0;height:7px;background:linear-gradient(90deg,var(--bl),var(--pk),var(--pu));border-radius:32px 32px 0 0}
.cinna-img{width:110px;height:100px;object-fit:contain;filter:drop-shadow(0 4px 12px rgba(168,216,240,.6));animation:bobble 2.6s ease-in-out infinite;flex-shrink:0}
@keyframes bobble{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-10px) rotate(2deg)}}
.hdr-text{text-align:left}
.hdr-title{font-family:'Nunito','Noto Sans TC',sans-serif;font-size:20px;font-weight:900;color:var(--dk);line-height:1.3}
.hdr-sub{font-size:12px;color:#9ab0cc;font-weight:700;margin-top:2px}
.hdr-score-big{font-size:13px;font-weight:800;color:var(--pk3);margin-top:6px}

/* ── TABS ── */
.tabs{display:flex;gap:8px;margin-bottom:16px;justify-content:center;animation:fadeUp .5s .2s both}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.tab{flex:1;max-width:220px;padding:11px 6px;border:none;border-radius:18px;font-size:14px;font-weight:800;font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:all .2s;box-shadow:var(--sh2)}
.tab.ch{background:linear-gradient(135deg,var(--pk),var(--pk2));color:#8b3a5a}
.tab.ma{background:linear-gradient(135deg,var(--bl),var(--bl2));color:#1a5a8a}
.tab.active{transform:scale(1.05) translateY(-2px);box-shadow:0 8px 24px rgba(100,150,220,.28)}
.tab:not(.active){opacity:.65;transform:scale(.97)}
.tab-icon{font-size:18px;display:block;margin-bottom:1px}

/* ── SCORE BAR ── */
.sbar{display:flex;align-items:center;background:white;border-radius:16px;padding:10px 16px;margin-bottom:14px;box-shadow:var(--sh2);gap:10px;animation:fadeUp .5s .3s both}
.sbar-info{font-size:13px;font-weight:700;color:var(--dk);white-space:nowrap}
.prog{flex:1;background:#e8f4fd;border-radius:20px;height:10px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--bl),var(--pk));border-radius:20px;transition:width .5s cubic-bezier(.23,1.32,.57,.97)}
.sbar-stars{font-size:16px;white-space:nowrap}

/* ── BUBBLE ── */
.bubble{background:white;border-radius:20px;padding:14px 18px;margin-bottom:14px;box-shadow:var(--sh2);position:relative;border:2px solid var(--bl);animation:fadeUp .5s .35s both}
.bubble::before{content:'';position:absolute;top:-11px;left:44px;border:6px solid transparent;border-bottom-color:var(--bl)}
.bubble::after{content:'';position:absolute;top:-8px;left:46px;border:5px solid transparent;border-bottom-color:white}
.bubble-lbl{font-size:10px;color:#9ab0cc;font-weight:700;margin-bottom:2px;letter-spacing:1px}
.bubble-txt{font-size:13px;font-weight:600;color:var(--tx);line-height:1.6}

/* ── QUESTION CARD ── */
.qcard{background:white;border-radius:24px;padding:22px 20px 18px;margin-bottom:14px;box-shadow:var(--sh);animation:slideIn .4s cubic-bezier(.23,1.32,.57,.97) both;position:relative;overflow:hidden}
.qcard::after{content:'';position:absolute;bottom:0;right:0;width:80px;height:80px;background:radial-gradient(circle,#eef7ff 0%,transparent 70%);pointer-events:none}
@keyframes slideIn{from{opacity:0;transform:translateX(32px) scale(.96)}to{opacity:1;transform:none}}
.qhdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.qbadge{background:linear-gradient(135deg,var(--bl),var(--dk));color:white;font-size:10px;font-weight:800;padding:3px 10px;border-radius:16px}
.qbadge.pk{background:linear-gradient(135deg,var(--pk2),var(--pk3))}
.qnum{font-size:11px;color:#b0b8cc;font-weight:700}
.qtype-tag{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700}
.qtype-tag.choice-tag{background:#e8f4fd;color:var(--dk)}
.qtype-tag.fill-tag{background:#fff0f5;color:var(--pk3)}
.qtype-tag.draw-tag{background:#f0eaff;color:var(--pu2)}
.qtxt{font-size:15px;font-weight:700;color:var(--tx);line-height:1.75;margin-bottom:4px}
.qhint{font-size:11px;color:#9ab0cc;margin-bottom:14px;font-style:italic}

/* ── OPTIONS ── */
.opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:6px}
.opts.col1{grid-template-columns:1fr}
.opt{padding:12px 13px;border:2.5px solid #e8eef8;border-radius:14px;background:var(--cr);font-size:13px;font-weight:600;font-family:'Noto Sans TC',sans-serif;color:var(--tx);cursor:pointer;transition:all .16s;text-align:left;line-height:1.5;position:relative}
.opt:hover:not(:disabled){border-color:var(--bl);background:#eef7fd;transform:translateY(-1px);box-shadow:0 3px 12px rgba(100,180,240,.18)}
.opt.ok{border-color:#5bcb8a;background:#eafaf2;color:#2a7a50;animation:popOk .3s cubic-bezier(.23,1.32,.57,.97)}
.opt.no{border-color:var(--pk2);background:#fff0f5;color:#c04070;animation:shakeX .3s ease}
.opt-letter{display:inline-block;width:20px;height:20px;border-radius:50%;background:var(--bl);color:white;font-size:10px;font-weight:900;text-align:center;line-height:20px;margin-right:6px;flex-shrink:0}
.opt.ok .opt-letter{background:#5bcb8a}
.opt.no .opt-letter{background:var(--pk2)}
@keyframes popOk{0%{transform:scale(1)}50%{transform:scale(1.04)}100%{transform:scale(1)}}
@keyframes shakeX{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

/* ── TEXT FILL ── */
.fill-row{display:flex;gap:8px;margin-bottom:10px;align-items:center}
.fill-in{flex:1;padding:12px 14px;border:2.5px solid #e8eef8;border-radius:14px;font-size:16px;font-family:'Noto Sans TC',sans-serif;font-weight:700;color:var(--tx);background:var(--cr);outline:none;transition:all .16s}
.fill-in:focus{border-color:var(--bl);background:#eef7fd;box-shadow:0 0 0 3px rgba(168,216,240,.18)}
.fill-in.ok{border-color:#5bcb8a;background:#eafaf2}
.fill-in.no{border-color:var(--pk2);background:#fff0f5}

/* ── CANVAS DRAW ── */
.canvas-area{margin-bottom:10px}
.canvas-lbl{font-size:12px;font-weight:700;color:var(--pu2);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.canvas-wrap{position:relative;border:2.5px solid var(--pu);border-radius:14px;overflow:hidden;background:white;touch-action:none}
canvas{display:block;cursor:crosshair;touch-action:none}
.canvas-tools{display:flex;gap:6px;margin-top:6px;align-items:center;flex-wrap:wrap}
.c-btn{padding:6px 12px;border:none;border-radius:10px;font-size:12px;font-weight:700;font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:all .15s}
.c-clr{background:#f0eaff;color:var(--pu2)}
.c-clr:hover{background:var(--pu);color:white}
.c-chk{background:linear-gradient(135deg,var(--pu),var(--pu2));color:white;box-shadow:0 3px 10px rgba(155,126,212,.35)}
.c-chk:hover{transform:translateY(-1px)}
.stroke-btns{display:flex;gap:4px}
.s-btn{width:28px;height:28px;border:2px solid #ddd;border-radius:8px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;background:white}
.s-btn.active{border-color:var(--pu2);background:#f0eaff}
.color-btns{display:flex;gap:4px}
.col-btn{width:22px;height:22px;border-radius:50%;border:2px solid #ddd;cursor:pointer;transition:all .15s}
.col-btn.active{border-color:#333;transform:scale(1.2)}

/* ── SUBMIT / NEXT / BACK ── */
.action-row{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.sub-btn{flex:1;min-width:120px;padding:12px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--bl),var(--dk));color:white;font-size:14px;font-weight:800;font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:all .16s;box-shadow:0 4px 12px rgba(58,123,191,.3)}
.sub-btn:hover{transform:translateY(-2px);box-shadow:0 7px 20px rgba(58,123,191,.4)}
@keyframes pulseBtn{0%,100%{box-shadow:0 4px 12px rgba(58,123,191,.3)}50%{box-shadow:0 4px 20px rgba(58,123,191,.55)}}
#submitFillBtn{animation:pulseBtn 2s ease-in-out infinite}
.sub-btn.pk{background:linear-gradient(135deg,var(--pk2),var(--pk3));box-shadow:0 4px 12px rgba(212,96,138,.3)}
.back-btn{padding:12px 16px;border:2px solid #e0e8f5;border-radius:14px;background:white;color:#9ab0cc;font-size:13px;font-weight:700;font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:all .16s}
.back-btn:hover{border-color:var(--bl);color:var(--dk);background:#eef7fd}
.next-btn{display:none;flex:1;min-width:120px;padding:12px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--pu),var(--pu2));color:white;font-size:14px;font-weight:800;font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:all .16s;box-shadow:0 4px 12px rgba(155,126,212,.35)}
.next-btn.show{display:block;animation:fadeUp .3s ease}
.next-btn:hover{transform:translateY(-2px)}

/* ── FEEDBACK ── */
.fb{border-radius:14px;padding:12px 14px;margin-top:10px;font-size:13px;font-weight:700;line-height:1.6;display:none}
.fb.show{display:block;animation:fadeUp .3s ease}
.fb.ok-fb{background:#eafaf2;color:#2a7a50;border:2px solid #5bcb8a}
.fb.no-fb{background:#fff0f5;color:#c04070;border:2px solid var(--pk2)}
.fb-emoji{font-size:18px;margin-right:4px}

/* ── RESULT ── */
.result{display:none;text-align:center;background:white;border-radius:28px;padding:30px 22px;box-shadow:var(--sh);animation:dropIn .5s ease both}
.result.show{display:block}
.res-emoji{font-size:56px;margin-bottom:10px}
.res-title{font-size:22px;font-weight:900;color:var(--dk);margin-bottom:6px}
.res-score{font-size:16px;font-weight:700;margin-bottom:4px}
.res-msg{font-size:13px;color:#9ab0cc;margin-bottom:20px}
.res-details{background:var(--cr);border-radius:14px;padding:14px;margin-bottom:18px;text-align:left}
.res-details h3{font-size:13px;font-weight:800;color:var(--dk);margin-bottom:10px}
.res-wrong-item{font-size:12px;font-weight:600;color:#c04070;padding:4px 0;border-bottom:1px solid #ffeef5;line-height:1.5}
.res-wrong-item:last-child{border:none}
.res-btn{padding:12px 24px;border:none;border-radius:16px;background:linear-gradient(135deg,var(--bl),var(--dk));color:white;font-size:14px;font-weight:800;font-family:'Noto Sans TC',sans-serif;cursor:pointer;box-shadow:0 4px 12px rgba(58,123,191,.3);transition:all .16s;margin:4px}
.res-btn:hover{transform:translateY(-2px)}
.res-btn.pk{background:linear-gradient(135deg,var(--pk2),var(--pk3))}
.res-btn.pu{background:linear-gradient(135deg,var(--pu),var(--pu2))}

/* confetti */
.conf{position:fixed;top:-20px;animation:confDrop linear forwards;z-index:999;pointer-events:none;border-radius:2px}
@keyframes confDrop{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(105vh) rotate(720deg);opacity:0}}

@media(max-width:480px){
  .opts{grid-template-columns:1fr}
  .hdr-title{font-size:17px}
  .qtxt{font-size:14px}
  .cinna-img{width:90px;height:82px}
}
</style>
</head>
<body>
<div class="wrap">

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-card">
    <img class="cinna-img" id="cinnaImg" alt="Cinnamoroll"/>
    <div class="hdr-text">
      <div class="hdr-title">🎮 Choco 的期中考闖關遊戲</div>
      <div class="hdr-sub">康軒國語 × 翰林數學 · 二年級下學期</div>
      <div class="hdr-score-big" id="hdrScore">⭐ 0 分</div>
    </div>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab ch active" onclick="switchSection('ch')">
    <span class="tab-icon">📖</span>第一部分：國語
  </button>
  <button class="tab ma" onclick="switchSection('ma')">
    <span class="tab-icon">🔢</span>第二部分：數學
  </button>
</div>

<!-- SCORE BAR -->
<div class="sbar">
  <div class="sbar-info" id="qCounter">第 1 / 15 題</div>
  <div class="prog"><div class="prog-fill" id="progFill" style="width:7%"></div></div>
  <div class="sbar-stars" id="sbarStars">⭐ 0</div>
</div>

<!-- BUBBLE -->
<div class="bubble">
  <div class="bubble-lbl">💬 Cinnamoroll 說：</div>
  <div class="bubble-txt" id="bubbleTxt">嗨！我是大耳狗～✨ 準備好了嗎？每次出15道題，答對就得星星！加油！🌟</div>
</div>

<!-- QUIZ AREA -->
<div id="quizArea"></div>
<div class="result" id="resultScreen"></div>

</div><!-- /wrap -->

// 背景裝飾
// ═══════════════════════════════════════════════
(()=>{
  ['⭐','🌟','✨','💫','🌸','🍀','🌈','💕'].forEach((s,i)=>{
    const el=document.createElement('div');
    el.className='star'; el.textContent=s;
    el.style.cssText=`top:${6+Math.random()*85}%;left:${3+Math.random()*94}%;animation-delay:${i*.3}s;`;
    document.body.appendChild(el);
  });
  for(let i=0;i<6;i++){
    const c=document.createElement('div'); c.className='cloud';
    const w=60+Math.random()*140,h=24+Math.random()*26;
    c.style.cssText=`width:${w}px;height:${h}px;top:${3+Math.random()*65}%;animation-duration:${20+Math.random()*30}s;animation-delay:-${Math.random()*30}s;`;
    document.body.appendChild(c);
  }
})();

let history=[];  // 記錄每題答題歷史 {qid, correct, userAns}

const DRAW_Q = 15; // 每次抽題數

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function startSession(){
  const bank = cur==='ch' ? CH_BANK : MA_BANK;
  pool = shuffle(bank).slice(0, DRAW_Q);
  idx=0; score=0; history=[];
  answered=false;
  document.getElementById('resultScreen').classList.remove('show');
  render();
}

// ── 選項洗牌 ──
function shuffleOpts(opts, correctIdx){
  const indexed = opts.map((o,i)=>({o,i}));
  for(let i=indexed.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [indexed[i],indexed[j]]=[indexed[j],indexed[i]];
  }
  const newOpts=indexed.map(x=>x.o);
  const newCorrectIdx=indexed.findIndex(x=>x.i===correctIdx);
  return{opts:newOpts, correctIdx:newCorrectIdx};
}

// ── 手寫畫布 ──
let canvas, ctx, drawing=false, strokeW=3, strokeColor='#222';

function initCanvas(){
  canvas=document.getElementById('drawCanvas');
  if(!canvas) return;
  ctx=canvas.getContext('2d');
  // 響應式寬度
  const wrap=document.getElementById('cwrap');
  const cw=Math.min(wrap.offsetWidth-4, 680);
  canvas.width=cw; canvas.height=110;
  ctx.fillStyle='#fafcff'; ctx.fillRect(0,0,canvas.width,canvas.height);
  // 虛線格線
  ctx.setLineDash([4,8]); ctx.strokeStyle='#dde8f5'; ctx.lineWidth=1;
  const mid=canvas.height/2;
  ctx.beginPath(); ctx.moveTo(0,mid); ctx.lineTo(canvas.width,mid); ctx.stroke();
  ctx.setLineDash([]); ctx.strokeStyle=strokeColor; ctx.lineWidth=strokeW;
  ctx.lineCap='round'; ctx.lineJoin='round';

  // 觸控 & 滑鼠事件
  canvas.addEventListener('mousedown',startDraw);
  canvas.addEventListener('mousemove',draw);
  canvas.addEventListener('mouseup',endDraw);
  canvas.addEventListener('mouseleave',endDraw);
  canvas.addEventListener('touchstart',e=>{e.preventDefault();startDraw(e.touches[0]);},{passive:false});
  canvas.addEventListener('touchmove',e=>{e.preventDefault();draw(e.touches[0]);},{passive:false});
  canvas.addEventListener('touchend',endDraw);
}

function getPos(e){
  const rect=canvas.getBoundingClientRect();
  const scaleX=canvas.width/rect.width;
  const scaleY=canvas.height/rect.height;
  return{x:(e.clientX-rect.left)*scaleX, y:(e.clientY-rect.top)*scaleY};
}
function startDraw(e){ drawing=true; const p=getPos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); }
function draw(e){ if(!drawing)return; const p=getPos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(p.x,p.y); }
function endDraw(){ drawing=false; ctx.beginPath(); }
function clearCanvas(){ ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle='#fafcff'; ctx.fillRect(0,0,canvas.width,canvas.height); ctx.setLineDash([4,8]); ctx.strokeStyle='#dde8f5'; ctx.lineWidth=1; const mid=canvas.height/2; ctx.beginPath(); ctx.moveTo(0,mid); ctx.lineTo(canvas.width,mid); ctx.stroke(); ctx.setLineDash([]); ctx.strokeStyle=strokeColor; ctx.lineWidth=strokeW; }
function setStroke(w,btn){ strokeW=w; ctx.lineWidth=w; document.querySelectorAll('.s-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }
function setColor(c,btn){ strokeColor=c; ctx.strokeStyle=c; document.querySelectorAll('.col-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }

// ═══════════════════════════════════════════════
// 答題邏輯
// ═══════════════════════════════════════════════
function checkChoice(sel){
  if(answered) return;
  answered=true;
  const correct = sel===window._correctDisplayIdx;
  if(correct) score++;
  window._shuffledOpts.forEach((_,i)=>{
    const b=document.getElementById(`opt${i}`);
    b.disabled=true;
    if(i===window._correctDisplayIdx) b.classList.add('ok');
    else if(i===sel&&!correct) b.classList.add('no');
  });
  const q=pool[idx];
  history.push({qid:q.id, correct, type:'choice', sel, correctIdx:window._correctDisplayIdx, opts:window._shuffledOpts});
  showFb(correct, q.ex);
}

function checkFill(){
  if(answered) return;
  const inp=document.getElementById('fillIn');
  // Allow submit even if only canvas drawn (treat as attempt)
  const val = inp ? inp.value.trim() : '';
  // Check if canvas has drawing
  const hasDrawing = canvas && isCanvasDrawn();
  if(!val && !hasDrawing){ if(inp) inp.focus(); return; }
  // If no text but has drawing, treat as "手寫作答" placeholder
  const evalVal = val || '（手寫作答）';
  answered=true;
  const q=pool[idx];
  let correct;
  if(val){
    correct = q.accepts
      ? q.accepts.some(a=> val===a || val.includes(a) || a.includes(val))
      : val===q.ans;
  } else {
    // Canvas-only: auto mark as correct with encouragement (teacher checks)
    correct = true;
  }
  if(correct) score++;
  if(inp){ inp.disabled=true; inp.classList.add(correct?'ok':'no'); }
  history.push({qid:q.id, correct, type:'fill', val:evalVal});
  showFb(correct, q.ex);
}

function checkFill2(){
  if(answered) return;
  const inp1=document.getElementById('fillIn1');
  const inp2=document.getElementById('fillIn2');
  const v1 = inp1 ? inp1.value.trim() : '';
  const v2 = inp2 ? inp2.value.trim() : '';
  const hasDrawing = canvas && isCanvasDrawn();
  if(!v1 && !v2 && !hasDrawing){ if(inp1) inp1.focus(); return; }
  answered=true;
  const q=pool[idx];
  const combined = (v1+v2).replace(/[，,。.\s]/g,'');
  let correct;
  if(v1 || v2){
    correct = q.accepts
      ? q.accepts.some(a=> combined.includes(a.replace(/[，,。.\s]/g,'')) || a.replace(/[，,。.\s]/g,'').includes(combined))
      : combined.includes(q.ans.replace(/[，,。.\s]/g,''));
    // also check each val separately
    if(!correct && q.accepts){
      correct = q.accepts.some(a=> v1.includes(a)||a.includes(v1)) ||
                q.accepts.some(a=> v2.includes(a)||a.includes(v2));
    }
  } else {
    correct = true; // canvas-only
  }
  if(correct) score++;
  if(inp1){ inp1.disabled=true; inp1.classList.add(correct?'ok':'no'); }
  if(inp2){ inp2.disabled=true; inp2.classList.add(correct?'ok':'no'); }
  history.push({qid:q.id, correct, type:'fill2', val:v1+'／'+v2});
  showFb(correct, q.ex);
}

function isCanvasDrawn(){
  if(!canvas || !ctx) return false;
  try{
    const data=ctx.getImageData(0,0,canvas.width,canvas.height).data;
    for(let i=0;i<data.length;i+=16){
      if(data[i+3]>30 && (data[i]<200||data[i+1]<200||data[i+2]<200)) return true;
    }
  }catch(e){}
  return false;
}

function showFb(ok, explain){
  const fb=document.getElementById('fbBox');
  const nxt=document.getElementById('nxtBtn');
  setBubble(ok ? rndMsg(bubbles.correct) : rndMsg(bubbles.wrong));
  fb.className=`fb ${ok?'ok-fb':'no-fb'} show`;
  fb.innerHTML=`<span class="fb-emoji">${ok?'🎉':'💡'}</span><strong>${ok?'答對了！':'再看看！正確答案：'}</strong><br>${explain.replace(/\n/g,'<br>')}`;
  if(nxt) nxt.classList.add('show');
  document.getElementById('sbarStars').textContent=`⭐ ${score}`;
  document.getElementById('hdrScore').textContent=`⭐ ${score} 分`;
  if(ok) confetti();
}

function restoreChoice(prevAns){
  answered=true;
  prevAns.opts.forEach((_,i)=>{
    const b=document.getElementById(`opt${i}`);
    if(!b) return;
    b.disabled=true;
    if(i===prevAns.correctIdx) b.classList.add('ok');
    else if(i===prevAns.sel&&!prevAns.correct) b.classList.add('no');
  });
  window._correctDisplayIdx=prevAns.correctIdx;
  window._shuffledOpts=prevAns.opts;
  const q=pool[idx];
  showFb(prevAns.correct, q.ex);
}

function restoreFill(prevAns){
  answered=true;
  const q=pool[idx];
  if(prevAns.type==='fill2'){
    const parts = prevAns.val.split('／');
    const inp1=document.getElementById('fillIn1');
    const inp2=document.getElementById('fillIn2');
    if(inp1){ inp1.value=parts[0]||''; inp1.disabled=true; inp1.classList.add(prevAns.correct?'ok':'no'); }
    if(inp2){ inp2.value=parts[1]||''; inp2.disabled=true; inp2.classList.add(prevAns.correct?'ok':'no'); }
  } else {
    const inp=document.getElementById('fillIn');
    if(inp){ inp.value=prevAns.val; inp.disabled=true; inp.classList.add(prevAns.correct?'ok':'no'); }
  }
  showFb(prevAns.correct, q.ex);
}

function nextQ(){
  idx++;
  if(idx>=pool.length) showResult();
  else render();
}

function goBack(){
  if(idx<=0) return;
  // Remove last history entry if it matches current
  const prevH=history.find(h=>h.qid===pool[idx-1].id);
  if(prevH && prevH.correct) score--;  // undo score
  // Remove last item
  const hIdx=history.findIndex(h=>h.qid===pool[idx-1].id);
  if(hIdx>-1) history.splice(hIdx,1);
  idx--;
  answered=false;
  render();
}

  const rs=document.getElementById('resultScreen');
  rs.classList.add('show');
  const total=pool.length, pct=Math.round(score/total*100);
  let emoji,title,msg;
  if(pct>=90){emoji='🏆';title='超級棒！接近滿分！';msg='Cinnamoroll 說：你真的太厲害了！繼續保持這樣的好成績！';}
  else if(pct>=70){emoji='🌟';title='做得很好！';msg='Cinnamoroll 說：再練習幾次，一定可以拿更高分！';}
  else{emoji='💪';title='繼續努力！';msg='Cinnamoroll 說：多練習幾次，一定會進步的！我支持你！';}

  // 錯題列表
  const wrongItems = history.filter(h=>!h.correct).map(h=>{
    const q=pool.find(p=>p.id===h.qid);
    if(!q) return '';
    const qText=q.q.replace(/\n/g,' ').slice(0,30)+'...';
    return `<div class="res-wrong-item">❌ [${q.s}] ${qText}</div>`;
  }).join('');

  document.getElementById('progFill').style.width='100%';
  document.getElementById('sbarStars').textContent=`⭐ ${score}`;
  document.getElementById('hdrScore').textContent=`⭐ ${score} 分`;
  document.getElementById('qCounter').textContent=`完成！${score}/${total}`;

  rs.innerHTML=`
    <div class="res-emoji">${emoji}</div>
    <div class="res-title">${title}</div>
    <div class="res-score">${score} / ${total} 題正確（${pct} 分）</div>
    <div class="res-msg">${msg}</div>
    ${wrongItems?`<div class="res-details"><h3>📋 這些題目再複習一下：</h3>${wrongItems}</div>`:''}
    <button class="res-btn pk" onclick="startSession()">🔄 再出一組題</button>
    <button class="res-btn pu" onclick="switchSection(cur==='ch'?'ma':'ch')">
      ➡️ 練習${cur==='ch'?'數學':'國語'}
    </button>
  `;

  setBubble(pct>=70?'哇！全部答完了！🎊 你超棒的！大耳狗超以你為榮！':'完成了！💪 多練習幾次，一定會進步！大耳狗支持你！');
  if(pct>=70) confetti(60);
}

// ═══════════════════════════════════════════════
// 切換科目
// ═══════════════════════════════════════════════
function switchSection(s){
  cur=s;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.tab.${s}`).classList.add('active');
  document.getElementById('resultScreen').classList.remove('show');
  startSession();
}

// ═══════════════════════════════════════════════
// 彩色紙花
// ═══════════════════════════════════════════════
function confetti(n=18){
  const cols=['#a8d8f0','#f9c4d2','#c9b8e8','#b5e8c8','#fff3b0','#f4a3be','#7ec8e8','#ffd700'];
  for(let i=0;i<n;i++){
    setTimeout(()=>{
      const c=document.createElement('div');
      c.className='conf';
      c.style.cssText=`left:${Math.random()*100}vw;background:${cols[Math.floor(Math.random()*cols.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.3+Math.random()*1.8}s;`;
      document.body.appendChild(c);
      setTimeout(()=>c.remove(),3200);
    },i*50);
  }
}

// ─── 初始化 ───
startSession();
</script>
